name: Release

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            npm-pkg: vibervn-context-engine-linux-x64
            bin: context-engine-rs
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            npm-pkg: vibervn-context-engine-linux-arm64
            bin: context-engine-rs
          - target: aarch64-apple-darwin
            runner: macos-latest
            npm-pkg: vibervn-context-engine-darwin-arm64
            bin: context-engine-rs
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-pkg: vibervn-context-engine-win32-x64
            bin: context-engine-rs.exe

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # SurrealDB's kv-rocksdb backend pulls in librocksdb-sys, which runs
      # bindgen at build time and needs libclang. Each OS gets it differently.
      - name: Install libclang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --no-progress -y
        shell: pwsh

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> "$env:GITHUB_ENV"
        shell: pwsh

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare npm package
        shell: bash
        run: |
          PKG_DIR="npm/${{ matrix.npm-pkg }}"
          mkdir -p "$PKG_DIR/bin"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$PKG_DIR/bin/"

      - name: Set executable permission
        if: runner.os != 'Windows'
        run: chmod +x "npm/${{ matrix.npm-pkg }}/bin/${{ matrix.bin }}"

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm-pkg }}
          path: npm/${{ matrix.npm-pkg }}/

  publish:
    name: Publish to npm
    needs: build
    # Only on pushes to master — never on PRs, so fork PRs can't read NPM_TOKEN.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    # contents: write so the version bump can be committed back to master.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Verify binaries and restore permissions
        shell: bash
        run: |
          set -e
          for p in linux-x64 linux-arm64 darwin-arm64; do
            bin="artifacts/vibervn-context-engine-$p/bin/context-engine-rs"
            test -f "$bin" || { echo "::error::missing $bin"; exit 1; }
            chmod +x "$bin"
          done
          win="artifacts/vibervn-context-engine-win32-x64/bin/context-engine-rs.exe"
          test -f "$win" || { echo "::error::missing $win"; exit 1; }

      - name: Publish packages
        id: publish
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e

          # Strategy B: Cargo.toml is the FLOOR. If its version isn't yet on npm,
          # publish it as-is (respects a manual minor/major bump). If it's already
          # taken, auto-bump the patch until we find a free version.
          BASE=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')
          if [[ ! "$BASE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Cargo.toml version must be plain X.Y.Z for auto-bump, got: '$BASE'"
            exit 1
          fi

          MAJOR="${BASE%%.*}"; REST="${BASE#*.}"; MINOR="${REST%%.*}"; PATCH="${REST#*.}"
          VERSION="$BASE"
          while npm view "vibervn-context-engine@$VERSION" version >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          done
          echo "Cargo.toml floor=$BASE → releasing version $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Stamp $VERSION into a package.json (and pin optionalDependencies for the main pkg).
          stamp() {
            DIR="$1" VERSION="$VERSION" node -e '
              const fs = require("fs");
              const f = process.env.DIR + "/package.json";
              const pkg = JSON.parse(fs.readFileSync(f, "utf8"));
              pkg.version = process.env.VERSION;
              for (const dep of Object.keys(pkg.optionalDependencies || {})) {
                pkg.optionalDependencies[dep] = process.env.VERSION;
              }
              fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + "\n");
            '
          }

          # Idempotent publish: skip-green if this exact version is already on npm.
          # (Belt-and-suspenders for re-runs; the loop above already picked a free version.)
          publish_if_new() {
            DIR="$1"
            NAME=$(node -p "require('./$DIR/package.json').name")
            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "→ $NAME@$VERSION already on npm — skip (green)"
            else
              echo "→ publishing $NAME@$VERSION"
              (cd "$DIR" && npm publish --access public)
            fi
          }

          # Platform packages FIRST (so the main pkg's optionalDependencies resolve)...
          for p in linux-x64 linux-arm64 darwin-arm64 win32-x64; do
            DIR="artifacts/vibervn-context-engine-$p"
            stamp "$DIR"
            publish_if_new "$DIR"
          done

          # ...main package LAST.
          stamp "npm/vibervn-context-engine"
          publish_if_new "npm/vibervn-context-engine"

      - name: Commit version bump back to master
        if: steps.publish.outputs.version != ''
        shell: bash
        env:
          VERSION: ${{ steps.publish.outputs.version }}
        run: |
          set -e
          # Sync Cargo.toml to the published version. Only the [package] version
          # (first `version =` in the file), not any dependency versions.
          sed -i -E '0,/^version = ".*"/s//version = "'"$VERSION"'"/' Cargo.toml

          # Keep Cargo.lock in sync so `cargo build --locked` keeps working.
          # Edit the lock entry directly (no cargo/network needed on this runner):
          # bump the `version` line that immediately follows our package's name.
          awk -v ver="$VERSION" '
            /^name = "context-engine-rs"$/ {
              print; getline
              sub(/version = ".*"/, "version = \"" ver "\"")
            }
            { print }
          ' Cargo.lock > Cargo.lock.tmp && mv Cargo.lock.tmp Cargo.lock

          if git diff --quiet Cargo.toml Cargo.lock; then
            echo "No version change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): v$VERSION [skip ci]"
          git push origin HEAD:master
